services:
  - type: web
    name: dailybrief
    runtime: python
    rootDir: .
    buildCommand: PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1 pip install --upgrade pip setuptools wheel && PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1 pip install -r requirements.txt && cd frontend && npm ci && npm run build
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
    healthCheckPath: /health
