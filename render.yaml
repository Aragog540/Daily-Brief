services:
  # ── Backend (FastAPI) ───────────────────────────────────────────────────────
  - type: web
    name: dailybrief-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
    healthCheckPath: /health

  # ── Frontend (React static site) ────────────────────────────────────────────
  - type: web
    name: dailybrief-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: dailybrief-api
          type: web
          property: host
          format: https://{host}
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
